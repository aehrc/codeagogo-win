version: 2
updates:
  # NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # npm (ecl-core bundle tooling)
  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
