name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in X.Y.Z format (got: $VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Check tag does not exist
        shell: bash
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date +%Y-%m-%d)
          # Replace [Unreleased] content header with versioned header, keep an empty [Unreleased] above
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Update version in project file
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" src/Codeagogo/Codeagogo.csproj

      - name: Commit release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md src/Codeagogo/Codeagogo.csproj
          git commit -m "release: v${{ inputs.version }}"

      - name: Create and push tag
        shell: bash
        run: |
          git tag "v${{ inputs.version }}"
          git push origin main --tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Codeagogo.sln

      - name: Build (Release)
        run: dotnet build Codeagogo.sln -c Release --no-restore -p:Version=${{ inputs.version }}

      - name: Test (unit tests only)
        run: dotnet test Codeagogo.sln -c Release --no-build --filter "Category!=E2E&Category!=Integration"

      - name: Check for vulnerable packages
        run: dotnet list Codeagogo.sln package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
        continue-on-error: true

      - name: Fail on vulnerable packages
        shell: pwsh
        run: |
          $report = Get-Content vulnerability-report.txt -Raw
          if ($report -match "has the following vulnerable packages") {
            Write-Error "Vulnerable NuGet packages detected! Review the output above."
            exit 1
          }

      - name: Publish (self-contained)
        run: >
          dotnet publish src/Codeagogo/Codeagogo.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ inputs.version }}
          -o publish

      - name: Install Velopack
        run: dotnet tool install -g vpk

      # Code signing via DigiCert Software Trust Manager (cloud HSM).
      # Required secrets: SM_API_KEY, SM_CLIENT_CERT_FILE_B64, SM_CLIENT_CERT_PASSWORD, SM_KEYPAIR_ALIAS
      - name: Decode signing certificate
        if: env.SM_API_KEY != ''
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
        shell: bash
        run: |
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > "${RUNNER_TEMP}/Certificate_pkcs12.p12"
          echo "SM_CLIENT_CERT_FILE=${RUNNER_TEMP}/Certificate_pkcs12.p12" >> "$GITHUB_ENV"

      - name: Sign executable with DigiCert
        if: env.SM_API_KEY != ''
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true
          input: publish/Codeagogo.exe
          keypair-alias: ${{ secrets.SM_KEYPAIR_ALIAS }}
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: Package with Velopack
        run: >
          vpk pack
          --packId Codeagogo
          --packVersion ${{ inputs.version }}
          --packDir publish
          --mainExe Codeagogo.exe
          --outputDir releases

      - name: Sign Velopack installer
        if: env.SM_API_KEY != ''
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true
          input: releases/Codeagogo-win-Setup.exe
          keypair-alias: ${{ secrets.SM_KEYPAIR_ALIAS }}
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: Extract changelog for release body
        id: changelog
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          # Write to file for the release action
          echo "$BODY" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Codeagogo ${{ inputs.version }}
          body_path: release-notes.md
          files: |
            releases/*
