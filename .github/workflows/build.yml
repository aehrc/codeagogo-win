name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SNOMEDLookup.sln

      - name: Build (Release)
        run: dotnet build SNOMEDLookup.sln -c Release --no-restore

      - name: Publish (self-contained)
        run: dotnet publish src/SNOMEDLookup/SNOMEDLookup.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o out

      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive -Path out\* -DestinationPath SNOMEDLookup-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNOMEDLookup-win-x64
          path: SNOMEDLookup-win-x64.zip
